dataset:
  name: arxiv
  description: >
    arXiv paper metadata. Two sources:
    - Local sample: arxiv_random_sample.parquet (1,000,000 papers)
    - Remote: open-index/open-arxiv on HuggingFace (2,990,000 papers, updated weekly)
  format: Parquet
  local_rows: 1_000_000
  remote_rows: 2_990_000
  total_columns: 14
  total_derived_columns: 27

columns:

  - name: id
    type: string
    description: Unique ArXiv paper identifier
    nullable: false
    unique_approx: 999979
    max_length: 16
    avg_length: 11.3
    example: "1607.03123"

  - name: submitter
    type: string
    description: Name of the person who submitted the paper to arXiv
    nullable: true
    null_rate_pct: 1.22
    unique_approx: 372533
    max_length: 64
    avg_length: 14.2
    example: "Marius de Leeuw"

  - name: authors
    type: string
    description: Comma-separated list of author names as plain text
    nullable: false
    unique_approx: 853638
    max_length: 60660
    avg_length: 72.9
    example: "Marius de Leeuw, Charlotte Kristjansen and Stefano Mori"

  - name: title
    type: string
    description: Title of the paper
    nullable: false
    unique_approx: 998918
    max_length: 382
    avg_length: 75.0
    example: "AdS/dCFT one-point functions of the SU(3) sector"

  - name: comments
    type: string
    description: >
      Free-form comments field often containing page/ figure counts or
      additional notes from the submitter
    nullable: true
    null_rate_pct: 25.69
    unique_approx: 491328
    max_length: 915
    avg_length: 60.9
    example: "6 pages"

  - name: journal-ref
    type: string
    description: Journal reference for published papers
    nullable: true
    null_rate_pct: 67.59
    unique_approx: 321620
    max_length: 545
    avg_length: 39.3
    example: "NOVAS Workshop, SIGMOD 2025"

  - name: doi
    type: string
    description: Digital Object Identifier for the published version
    nullable: true
    null_rate_pct: 58.53
    unique_approx: 414259
    max_length: 151
    avg_length: 25.1
    example: "10.1016/j.physletb.2016.10.044"

  - name: report-no
    type: string
    description: Institutional report number assigned to the paper
    nullable: true
    null_rate_pct: 90.73
    unique_approx: 90609
    max_length: 459
    avg_length: 19.1
    example: "DIAS-STP-16-06"

  - name: categories
    type: string
    description: >
      Space-separated list of arXiv category tags (e.g., primary and
      cross-list categories)
    nullable: false
    unique_approx: 46787
    max_length: 120
    avg_length: 14.2
    example: "hep-th cond-mat.stat-mech nlin.SI"

  - name: license
    type: string
    description: URL of the license under which the paper is distributed
    nullable: true
    null_rate_pct: 32.85
    unique_values: 10
    distribution:
      http://arxiv.org/licenses/nonexclusive-distrib/1.0/: 40.2%
      null: 32.9%
      http://creativecommons.org/licenses/by/4.0/: 19.8%
      http://creativecommons.org/licenses/by-nc-nd/4.0/: 3.1%
      other (6 variants): 4.0%
    example: "http://arxiv.org/licenses/nonexclusive-distrib/1.0/"

  - name: abstract
    type: string
    description: Full text abstract of the paper
    nullable: false
    max_length: 4199
    avg_length: 980.7
    example: "We propose a closed formula for ..."

  - name: versions
    type: array[struct]
    description: >
      Array of version records, each containing a version tag and
      creation timestamp. Papers may have multiple versions as revisions
      are uploaded.
    nullable: false
    avg_length_per_paper: 1.54
    max_length_per_paper: 166
    element_schema:
      version:
        type: string
        description: Version tag (e.g., "v1", "v2")
        example: "v1"
      created:
        type: string
        description: Creation timestamp in RFC 2822 format
        example: "Mon, 11 Jul 2016 20:01:07 GMT"
    example: "[{'version': 'v1', 'created': 'Mon, 11 Jul 2016 20:01:07 GMT'}]"

  - name: update_date
    type: string
    description: Date of the most recent version update, in YYYY-MM-DD format
    nullable: false
    max_length: 10
    avg_length: 10.0
    example: "2016-10-26"

  - name: authors_parsed
    type: array[array[string]]
    description: >
      Parsed author names as nested arrays. Each author is a 3-element
      array of [last_name, first_names, suffix], where suffix is typically
      an empty string.
    nullable: false
    avg_length_per_paper: 4.45
    max_length_per_paper: 3435
    element_schema:
      - last_name:
          type: string
          description: Author's surname
          example: "de Leeuw"
      - first_names:
          type: string
          description: Author's given name(s)
          example: "Marius"
      - suffix:
          type: string
          description: Suffix (typically empty)
          example: ""
    example: "['de Leeuw', 'Marius', '']"

derived_columns:

  # Temporal
  - name: date
    type: date
    description: Date of the most recent version update, parsed from update_date
    used_in: Dashboard, Trends

  - name: year
    type: int32
    description: Year extracted from update_date
    used_in: Dashboard, Search filter, Trends

  - name: month
    type: int32
    description: Month extracted from update_date (1–12)
    used_in: Dashboard, Trends (heatmap)

  - name: month_name
    type: string
    description: Abbreviated month name (e.g. Jan, Feb)
    used_in: Dashboard, Trends

  # Categories
  - name: n_cats
    type: uint32
    description: Number of research categories assigned to a paper
    used_in: Categories page

  - name: label
    type: string
    description: Human-readable name for an arXiv category code, mapped via labels.CATEGORY_LABELS
    used_in: Dashboard, Categories page

  - name: domain
    type: string
    description: Top-level arXiv domain extracted from the first segment of a category code (e.g. cs, math, physics)
    used_in: Network — Drill Down

  - name: subcategories
    type: uint32
    description: Number of sub-categories within a domain
    used_in: Network — Drill Down

  - name: categories_b
    type: string
    description: Second research area in a co-occurrence pair (used in self-joins)
    used_in: Network — Category Network (internal)

  - name: license_short
    type: string
    description: Shortened human-readable license category (e.g. CC BY 4.0, arXiv nonexclusive)
    used_in: Dashboard

  # Authors
  - name: n_authors
    type: uint32
    description: Number of authors listed on the paper
    used_in: Authors page, Network — Stats

  - name: n_auth_binned
    type: uint32
    description: Number of authors, capped at 51 for histogram display
    used_in: Authors page

  - name: full_name
    type: string
    description: Author's full name constructed as "first_name last_name" from authors_parsed
    used_in: Network — Co-Author Search, Stats, Drill Down; Dashboard

  - name: papers
    type: uint32
    description: Number of papers associated with an author, category, or domain
    used_in: Network — Stats, Drill Down

  - name: pct
    type: int32
    description: Author's paper count as a percentage of the top author in the current category
    used_in: Network — Drill Down (% of Top column)

  - name: relative
    type: int32
    description: Author's paper count as a percentage of the most published author in the dataset
    used_in: Network — Stats (vs #1 column)

  # Text length
  - name: title_len
    type: uint32
    description: Total characters in the paper title
    used_in: Trends — Text tab

  - name: abstract_len
    type: uint32
    description: Total characters in the abstract
    used_in: Trends — Text tab

  - name: comments_len
    type: uint32
    description: Total characters in the comments field
    used_in: Trends — Comments tab

  # Comments flags
  - name: has_pages
    type: bool
    description: Whether the comments field includes a page count
    used_in: Trends — Comments tab

  - name: has_figures
    type: bool
    description: Whether the comments field includes a figure count
    used_in: Trends — Comments tab

  - name: has_refs
    type: bool
    description: Whether the comments field includes a reference count
    used_in: Trends — Comments tab

  # Versions
  - name: n_versions
    type: uint32
    description: Number of versions (revisions) the paper has gone through
    used_in: Trends — Versions tab

  - name: n_vers_binned
    type: uint32
    description: Number of versions, capped at 21 for histogram display
    used_in: Trends — Versions tab

  # Aggregation
  - name: count
    type: uint32
    description: Number of occurrences, papers, or items in the current grouping
    used_in: All pages (aggregations)

  - name: filled_pct
    type: float64
    description: Proportion of non-null values for a column (0.0–1.0)
    used_in: Dashboard (data completeness chart)

  - name: _row_idx
    type: Int64
    description: Internal row index for joining operations (not displayed)
    used_in: Network — Category Network (internal)
