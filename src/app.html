<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Search and visualize the arXiv research corpus — category networks, co-authorship graphs, and Granger-causal trends across three decades of science." />
		<meta property="og:site_name" content="arXiv Data Explorer" />
		<meta property="og:type" content="website" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f4f4f0" media="(prefers-color-scheme: light)" />
		<script>
			(function () {
				var t = localStorage.getItem("theme");
				if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
					document.documentElement.classList.add("dark");
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
